---
services:
  postgres-primary:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      REPLICATION_PASSWORD: postgres
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - ./deploy/postgres/primary/configure-replication.sh:/docker-entrypoint-initdb.d/configure-replication.sh:ro
      - ./deploy/postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-replica:
    build:
      context: ./deploy/postgres/replica
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: postgres
      REPLICA_OF: postgres-primary
      REPLICATION_PASSWORD: postgres
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
