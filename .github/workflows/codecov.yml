---
name: Coverage badge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  codecov:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install gocovmerge
        run: go install github.com/wadey/gocovmerge@latest

      - name: Start PostgreSQL cluster
        run: docker compose -f .github/integration-docker-compose.yml --project-directory ${{ github.workspace }} up -d --wait

      - name: Run unit tests with coverage
        run: go test -coverprofile=coverage-unit.txt -covermode atomic $(go list ./... | grep -v /examples/)

      - name: Run integration tests with coverage
        run: go test -tags=integration -coverprofile=coverage-int.txt -covermode atomic ./database/...

      - name: Merge coverage profiles
        run: gocovmerge coverage-unit.txt coverage-int.txt > coverage.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.txt
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Cleanup PostgreSQL cluster
        if: always()
        run: docker compose -f .github/integration-docker-compose.yml --project-directory ${{ github.workspace }} down -v --remove-orphans
