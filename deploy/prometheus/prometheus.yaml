global:
  scrape_interval: 15s
  scrape_native_histograms: true

storage:
  tsdb:
    out_of_order_time_window: 10m

scrape_configs:
  - job_name: 'restapi'
    static_configs:
      - targets: ['restapi:8081']
        labels:
          service: 'restapi-example'

  - job_name: 'otelcol'
    static_configs:
      - targets: ['localhost:8889']
        labels:
          service: 'otel-lgtm'
