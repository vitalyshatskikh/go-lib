services:
  restapi:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "18080:8080"
      - "18081:8081"
    environment:
      - APP_NAME=restapi-example
      - APP_ENVIRONMENT=dev
      - LOGGING_LEVEL=debug
      - LOGGING_ADD_CALLER=true
      - TELEMETRY_ENABLED=true
      - TELEMETRY_TRACING_ENDPOINT=otel-lgtm:4317
      - POSTGRES_DSN=postgres://postgres:postgres@postgres-primary:5432,postgres-replica:5432/postgres?target_session_attrs=prefer-standby
      - POSTGRES_POOL_NAME=postgres-prefer-standby
      - SENTRY_DSN=http://public@sentry-mock:19000/restapi
    depends_on:
      - otel-lgtm
      - sentry-mock

  loadgen:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/loadgen"]
    environment:
      - TARGET_URL=http://restapi:8080/api/hello
      - RPS=3
      - WORKERS=2
      - DURATION=600s
    depends_on:
      - restapi

  postgres-primary:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      REPLICATION_PASSWORD: postgres
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./deploy/postgres/primary/configure-replication.sh:/docker-entrypoint-initdb.d/configure-replication.sh:ro
      - ./deploy/postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-replica:
    build:
      context: ./deploy/postgres/replica
    restart: unless-stopped
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: postgres
      REPLICA_OF: postgres-primary
      REPLICATION_PASSWORD: postgres
    ports:
      - "15433:5432"

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    restart: unless-stopped
    ports:
      - "14317:4317"
      - "14318:4318"
      - "13000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - otel-lgtm-grafana:/data/grafana
      - otel-lgtm-prometheus:/data/prometheus
      - otel-lgtm-loki:/data/loki
      - ./deploy/prometheus/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ./deploy/grafana/dashboards-provisioning.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro
      - ./deploy/grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards/custom:ro

  sentry-mock:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/sentry-mock"]
    ports:
      - "19000:19000"
    restart: unless-stopped

volumes:
  postgres-primary-data:
  postgres-replica-data:
  otel-lgtm-grafana:
  otel-lgtm-prometheus:
  otel-lgtm-loki:
